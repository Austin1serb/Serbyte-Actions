name: Send Professionalized Commit Email

on:
  workflow_call:
    inputs:
      client_email:
        description: "Email address to send the commit summary to"
        required: true
        type: string
    secrets:
      OPENAI_API_KEY:
        required: true
      SMTP_USERNAME:
        required: true
      SMTP_PASSWORD:
        required: true

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout client repository
        uses: actions/checkout@v4
        with:
          path: client-repo

      - name: Checkout reusable workflows repository
        uses: actions/checkout@v4
        with:
          repository: Austin1serb/Serbyte-Actions
          token: ${{ secrets.GITHUB_TOKEN }}
          path: reusable-workflows

      - name: Cache reuseable-workflows
        uses: actions/cache@v4
        with:
          path: reusable-workflows/.git
          key: reusable-workflows-${{ runner.os }}-${{ hashFiles('reusable-workflows/.git/HEAD') }}
          restore-keys: |
            reusable-workflows-${{ runner.os }}-

      - name: Get latest commit message
        run: |
          cd client-repo
          commit_msg=$(git log -1 --pretty=format:'%s')
          echo "commit_msg=$commit_msg" >> $GITHUB_ENV

      - name: Make scripts executable
        run: chmod +x reusable-workflows/commit-emailer/*.sh

      - name: Load Prompt
        run: bash reusable-workflows/commit-emailer/prepare_files.sh load_prompt

      - name: Professionalize commit message
        run: bash reusable-workflows/commit-emailer/call_openai.sh "${{ env.prompt }}" "${{ env.commit_msg }}" "${{ secrets.OPENAI_API_KEY }}"

      - name: Prepare final HTML email
        run: bash reusable-workflows/commit-emailer/prepare_files.sh prepare_email "${{ env.professional_msg }}"

      - name: Confirm email_ready.html
        run: |
          if [ ! -f "email_ready.html" ]; then
            echo "❌ email_ready.html missing!"
            exit 1
          fi
          echo "✅ email_ready.html is ready!"

      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Website Update: New Changes Implemented"
          html_body: file://email_ready.html
          to: ${{ inputs.client_email }}
          from: ${{ secrets.SMTP_USERNAME }}
