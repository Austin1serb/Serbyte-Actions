name: Build & Release
on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci
      - run: npm run build

      # Fail if dist/ has uncommitted changes (ensures build was checked in)
      - name: Check dist for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "❌ 'dist/' has uncommitted changes. Please build and commit them." >&2
            exit 1
          fi

      # Create version tag based on package.json version
      - name: Extract version from package.json
        id: version
        run: echo "version=v$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Tag commit with version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.version.outputs.version }} || echo "Tag already exists"
          git push origin ${{ steps.version.outputs.version }}

      # Update v1 tag to always point to latest
      - name: Force-move `v1` tag
        run: |
          git tag -f v1
          git push origin -f v1

      # Create GitHub Release
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
