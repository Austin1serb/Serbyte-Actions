name: Build & Release
on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      # Fail if dist/ has uncommitted changes (ensures build was checked in)
      - name: Soft-check dist/ for changes
        run: |
          if git diff --quiet -- dist; then
           echo "✅ dist/ is clean and committed"
          else
           echo "::warning::⚠️ dist/ has changes. Did you forget to rebuild or commit?"
          fi

      # Create version tag based on package.json version
      - name: Auto-bump patch version
        id: version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
           
          # Get current version
            current=$(jq -r .version package.json)
             echo "Current version: $current"

           # Bump patch (x.y.z+1)
           new=$(npx semver $current -i patch)
           echo "New version: $new"

           # Update package.json
           jq --arg v "$new" '.version = $v' package.json > temp.json && mv temp.json package.json
           git add package.json
           git commit -m "chore: bump version to v$new"
           echo "version=v$new" >> $GITHUB_OUTPUT

      - name: Tag commit with version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.version.outputs.version }} || echo "Tag already exists"
          git push origin ${{ steps.version.outputs.version }}

      # Update v1 tag to always point to latest
      - name: Force-move `v1` tag
        run: |
          git tag -f v1
          git push origin -f v1

      # Create GitHub Release
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
